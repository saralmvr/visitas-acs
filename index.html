<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="content first-content">
             <div class="first-column">
                <h2 class="title">Olá de novo!</h2>
                <p class="description">Para continuar conectado</p>
                <p class="description">por favor, insira suas informações</p>
                <button class="btn">Entrar</button>
             </div>
             <div class="second-column">
                <h2 class="title">Cadastre-se</h2>
                <div class="social-media">
                    <ul>
                        <li><a href="#">Facebook</a></li>
                        <li><a href="#">Google</a></li>
                    </ul>
                </div>
                <p class="description">ou use seu email</p>
                <form class="form">
                    <input type="text" placeholder="Nome">
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Senha">
                    <button class="btn">Registrar</button
                </form>
            </div>   
        </div>
    <div class="content second-content">
            <div class="first-column">
                <h2 class="title">Seja bem vindo!</h2>
                <p class="description">Insira suas informações</p>
                <p class="description">e comece a usar nosso serviço</p>
                <button class="btn">Registrar</button>
             </div>
             <div class="second-column">
                <h2 class="title">Entrar</h2>
                <div class="social-media">
                    <ul>
                        <li><a href="#">Facebook</a></li>
                        <li><a href="#">Google</a></li>
                    </ul>
                </div>
                <p class="description">ou use seu email</p>
                <form class="form">
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Senha">
                    <a href="#">Esqueceu sua senha?</a>
                    <button class="btn">Entrar</button
                </form>
            </div>
    </div>
    </div>
</body>
</html>
